services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
    expose:
      - "3000"
    # Habilite apenas se sua instância Dokploy exigir rede externa explícita.
