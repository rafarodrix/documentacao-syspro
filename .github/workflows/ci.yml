name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: UTF-8 check
        run: npm run check:utf8

      - name: Generated JS check (src/tests)
        run: npm run check:generated-js

      - name: Prisma schema validate
        run: npm run db:validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
          DIRECT_URL: postgresql://ci:ci@localhost/ci

      - name: Prisma generate smoke
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
          DIRECT_URL: postgresql://ci:ci@localhost/ci

      - name: Docs check
        run: npm run docs:check

      - name: Lint
        run: npm run lint

      - name: Lint remote strict
        run: npm run lint:remote

      - name: Typecheck contracts
        run: npm run typecheck:contracts

      - name: Typecheck web
        run: npm run typecheck

      - name: Typecheck app-api
        run: npm run typecheck:api

      - name: Test app-api
        run: npm run test:api

      - name: Typecheck app-mobile
        run: npm run typecheck:mobile

      - name: Test web
        run: npm run test

      - name: Test authz
        run: npm run test:authz

      - name: Test tickets
        run: npm run test:tickets

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web
        run: npm run build
        env:
          APP_BACKEND_API_URL: http://localhost:3001/api
          INTERNAL_API_KEY: ci-build-key

      - name: Build app-api shell
        run: npm run build:api

      - name: Build app-mobile shell
        run: npm run build:mobile
