name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: UTF-8 check
        run: npm run check:utf8

      - name: Generated JS check (src/tests)
        run: npm run check:generated-js

      - name: Prisma schema validate
        run: npm run db:validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
          DIRECT_URL: postgresql://ci:ci@localhost/ci

      - name: Prisma generate smoke
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
          DIRECT_URL: postgresql://ci:ci@localhost/ci

      - name: Docs check
        run: npm run docs:check

      - name: Lint (turbo — todos os workspaces)
        run: npm run lint

      - name: Lint remote strict
        run: npm run lint:remote

      - name: Lint design system
        run: npm run lint:ds

      - name: Typecheck (turbo — todos os workspaces)
        run: npm run typecheck

      - name: Typecheck contracts
        run: npm run typecheck:contracts

      - name: Test (turbo — todos os workspaces)
        run: npm run test

      - name: Test authz
        run: npm run test:authz

      - name: Test tickets
        run: npm run test:tickets

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Next.js build cache
        uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('apps/web/src/**.[jt]s', 'apps/web/src/**.[jt]sx') }}
          restore-keys: ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (turbo — todos os workspaces em ordem)
        run: npm run build
        env:
          APP_BACKEND_API_URL: http://localhost:3001/api
          INTERNAL_API_KEY: ci-build-key
          NEXT_TELEMETRY_DISABLED: "1"
