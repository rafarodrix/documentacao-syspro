version: 2

updates:
  # npm workspaces — todos os packages do monorepo
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      typescript-eslint:
        patterns: ["@typescript-eslint/*"]
      next-ecosystem:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      prisma:
        patterns: ["prisma", "@prisma/*"]
      testing:
        patterns: ["vitest", "@vitest/*", "playwright", "@playwright/*"]

  # Go — apps/agent
  - package-ecosystem: gomod
    directory: "/apps/agent"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
