services:
  # ─── Banco de dados (perfil opcional para ambientes self-hosted) ───────────
  postgres:
    image: postgres:16-alpine
    profiles: [postgres]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syspro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-syspro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PgBouncer (perfil opcional — recomendado em produção) ────────────────
  #
  # Ative com: docker compose --profile pgbouncer up
  #
  # Quando ativo, o backend deve usar:
  #   DATABASE_URL=postgresql://user:pass@pgbouncer:5432/syspro?pgbouncer=true
  #   DIRECT_URL=postgresql://user:pass@postgres:5432/syspro   (para migrations)
  #
  # Em ambientes gerenciados (Dokploy, Supabase, Neon), configure o pooler
  # externamente e ajuste DATABASE_URL/DIRECT_URL no painel.
  pgbouncer:
    image: edoburu/pgbouncer:1.22
    profiles: [pgbouncer]
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-syspro}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - "5432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend NestJS ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../../..
      dockerfile: apps/api/deploy/Dockerfile
    restart: unless-stopped
    #env_file:
        #- ../../../.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      EXTRA_TRUSTED_ORIGINS: ${EXTRA_TRUSTED_ORIGINS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REMOTE_DISCOVERY_TOKEN: ${REMOTE_DISCOVERY_TOKEN:-}
      REMOTE_AGENT_TOKEN_TTL_DAYS: ${REMOTE_AGENT_TOKEN_TTL_DAYS:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      EVOLUTION_INSTANCE_TOKEN: ${EVOLUTION_INSTANCE_TOKEN:-}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET}
      CHATWOOT_URL: ${CHATWOOT_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_PLATFORM_API_TOKEN: ${CHATWOOT_PLATFORM_API_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID}
      CHATWOOT_INBOX_IDENTIFIER: ${CHATWOOT_INBOX_IDENTIFIER:-}
      CHATWOOT_WEBHOOK_SECRET: ${CHATWOOT_WEBHOOK_SECRET}
      CHATWOOT_WEBHOOK_MAX_SKEW_SECONDS: ${CHATWOOT_WEBHOOK_MAX_SKEW_SECONDS:-300}
      CHATWOOT_INCOMING_MEDIA_MODE: ${CHATWOOT_INCOMING_MEDIA_MODE:-link}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_SIGNED_URL_TTL_SECONDS: ${R2_SIGNED_URL_TTL_SECONDS:-900}
      INTEGRATION_WEBHOOK_DEDUP_TTL_SECONDS: ${INTEGRATION_WEBHOOK_DEDUP_TTL_SECONDS:-86400}
      INTEGRATION_CONFIG_ENCRYPTION_KEY: ${INTEGRATION_CONFIG_ENCRYPTION_KEY:-}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health/live || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - dokploy-network

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
