services:
  backend:
    build:
      context: ../../..
      dockerfile: apps/api/deploy/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      EXTRA_TRUSTED_ORIGINS: ${EXTRA_TRUSTED_ORIGINS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REMOTE_DISCOVERY_TOKEN: ${REMOTE_DISCOVERY_TOKEN:-}
      REMOTE_AGENT_TOKEN_TTL_DAYS: ${REMOTE_AGENT_TOKEN_TTL_DAYS:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      EVOLUTION_INSTANCE_TOKEN: ${EVOLUTION_INSTANCE_TOKEN:-}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET}
      CHATWOOT_URL: ${CHATWOOT_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_PLATFORM_API_TOKEN: ${CHATWOOT_PLATFORM_API_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID}
      CHATWOOT_INBOX_IDENTIFIER: ${CHATWOOT_INBOX_IDENTIFIER:-}
      CHATWOOT_WEBHOOK_SECRET: ${CHATWOOT_WEBHOOK_SECRET}
      CHATWOOT_WEBHOOK_MAX_SKEW_SECONDS: ${CHATWOOT_WEBHOOK_MAX_SKEW_SECONDS:-300}
      CHATWOOT_INCOMING_MEDIA_MODE: ${CHATWOOT_INCOMING_MEDIA_MODE:-link}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_SIGNED_URL_TTL_SECONDS: ${R2_SIGNED_URL_TTL_SECONDS:-900}
      INTEGRATION_WEBHOOK_DEDUP_TTL_SECONDS: ${INTEGRATION_WEBHOOK_DEDUP_TTL_SECONDS:-86400}
      INTEGRATION_CONFIG_ENCRYPTION_KEY: ${INTEGRATION_CONFIG_ENCRYPTION_KEY:-}
    expose:
      - "3000"
