<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trilink Agent Setup</title>
  <style>
    :root {
      --bg-top: #f2f6fa;
      --bg-bottom: #e7edf3;
      --shell: rgba(255, 255, 255, 0.78);
      --panel: #ffffff;
      --panel-strong: #f7fafc;
      --line: #d8e2ea;
      --line-strong: #c7d5e1;
      --text: #162534;
      --muted: #617286;
      --subtle: #7d8ea2;
      --brand: #103f69;
      --brand-2: #196fb4;
      --brand-soft: #e4eef7;
      --ok: #0d7046;
      --ok-soft: #e9f8f0;
      --warn: #946111;
      --warn-soft: #fff4de;
      --err: #a2353a;
      --err-soft: #fbe9ea;
      --shadow: 0 22px 50px rgba(20, 39, 58, 0.14);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(25, 111, 180, 0.10), transparent 34%),
        radial-gradient(circle at top left, rgba(16, 63, 105, 0.08), transparent 26%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 18px;
    }

    .shell {
      width: 100%;
      max-width: 500px;
      min-height: 100%;
      padding: 10px;
      border-radius: 34px;
      background: var(--shell);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      backdrop-filter: blur(18px);
    }

    .panel {
      min-height: 100%;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      box-shadow: var(--shadow);
      border: 1px solid rgba(223, 232, 239, 0.95);
    }

    .hero {
      position: relative;
      padding: 24px 24px 18px;
      background:
        linear-gradient(135deg, rgba(16, 63, 105, 0.06), rgba(25, 111, 180, 0.01)),
        linear-gradient(180deg, #fdfefe 0%, #f4f8fb 100%);
      border-bottom: 1px solid var(--line);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -56px;
      top: -46px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(25, 111, 180, 0.18), transparent 68%);
      pointer-events: none;
    }

    .hero-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .hero-copy {
      min-width: 0;
      flex: 1;
    }

    .brand-logo {
      position: relative;
      z-index: 1;
      height: 34px;
      width: auto;
      object-fit: contain;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(16, 63, 105, 0.08);
      color: var(--brand);
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 14px 0 8px;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 320px;
    }

    .summary {
      position: relative;
      z-index: 1;
      max-width: 380px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--muted);
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .hero-stat {
      padding: 14px 14px 12px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(216, 226, 234, 0.96);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
    }

    .hero-stat-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    .hero-stat-value {
      margin-top: 8px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .hero-stat-value.brand {
      color: var(--brand);
    }

    .section {
      padding: 18px 24px 0;
    }

    .card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
    }

    .card.soft {
      background: linear-gradient(180deg, #ffffff 0%, var(--panel-strong) 100%);
    }

    .card-body {
      padding: 18px 18px 20px;
    }

    .progress-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .progress-copy {
      min-width: 0;
      flex: 1;
    }

    .progress-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    .stage {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .percent {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--brand);
      white-space: nowrap;
    }

    .bar {
      width: 100%;
      height: 12px;
      margin-top: 16px;
      border-radius: 999px;
      background: #e5edf3;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background:
        linear-gradient(90deg, var(--brand) 0%, var(--brand-2) 100%);
      box-shadow: 0 0 24px rgba(25, 111, 180, 0.28);
      transition: width .35s ease;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
    }

    .focus-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .focus-copy {
      min-width: 0;
    }

    .focus-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--subtle);
      font-weight: 800;
    }

    .focus-title {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .focus-detail {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
      max-width: 360px;
    }

    .focus-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      min-height: 92px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(16, 63, 105, 0.10), rgba(25, 111, 180, 0.16));
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-align: center;
      padding: 12px;
      line-height: 1.4;
    }

    .error {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: var(--err-soft);
      border: 1px solid rgba(162, 53, 58, 0.16);
      color: var(--err);
      display: none;
      font-size: 13px;
      line-height: 1.6;
      font-weight: 600;
    }

    .error.visible {
      display: block;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status-row strong {
      color: var(--text);
      font-weight: 700;
    }

    .steps-section {
      padding: 18px 24px 0;
    }

    .steps-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 14px;
      align-items: start;
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdfe 100%);
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }

    .step.pending {
      border-color: rgba(148, 97, 17, 0.28);
      box-shadow: inset 0 0 0 1px rgba(255, 244, 222, 0.7);
    }

    .step.error {
      border-color: rgba(162, 53, 58, 0.22);
      background: linear-gradient(180deg, #ffffff 0%, #fff8f8 100%);
    }

    .step.complete {
      border-color: rgba(13, 112, 70, 0.20);
      background: linear-gradient(180deg, #ffffff 0%, #f7fcf9 100%);
    }

    .step-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: #edf3f8;
      color: var(--brand);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .step.pending .step-index {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .step.error .step-index {
      background: var(--err-soft);
      color: var(--err);
    }

    .step.complete .step-index {
      background: var(--ok-soft);
      color: var(--ok);
    }

    .step-copy {
      min-width: 0;
    }

    .step-label {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .step-detail {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .step-status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: #eef3f7;
      color: var(--subtle);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .step.complete .step-status {
      background: var(--ok-soft);
      color: var(--ok);
    }

    .step.pending .step-status {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .step.error .step-status {
      background: var(--err-soft);
      color: var(--err);
    }

    .completed-wrap {
      margin-top: 14px;
    }

    .completed-block {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .completed-toggle {
      cursor: pointer;
      list-style: none;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    .completed-toggle::-webkit-details-marker {
      display: none;
    }

    .completed-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      padding: 18px 24px 24px;
      flex-wrap: wrap;
    }

    .actions button {
      border: 0;
      border-radius: 999px;
      min-height: 44px;
      padding: 0 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      background: linear-gradient(180deg, #103f69 0%, #144f83 100%);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(16, 63, 105, 0.18);
    }

    .actions button.secondary {
      background: #dde5eb;
      color: var(--text);
      box-shadow: none;
    }

    @media (max-width: 540px) {
      body {
        padding: 10px;
      }

      .shell {
        padding: 6px;
        border-radius: 26px;
      }

      .hero-grid {
        grid-template-columns: 1fr;
      }

      .focus-card {
        grid-template-columns: 1fr;
      }

      .focus-badge {
        min-width: auto;
        min-height: 72px;
      }

      .step {
        grid-template-columns: 42px 1fr;
      }

      .step-status {
        grid-column: 2;
        justify-self: start;
      }

      .status-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="hero">
        <div class="hero-top">
          <div class="hero-copy">
            <div class="eyebrow">Trilink Enterprise Agent</div>
            <h1 id="title">Instalacao do Agente Trilink</h1>
            <div class="summary" id="summary"></div>
          </div>
          <img class="brand-logo" id="brand-logo" alt="Trilink" />
        </div>
        <div class="hero-grid">
          <div class="hero-stat">
            <div class="hero-stat-label">Etapa</div>
            <div class="hero-stat-value" id="hero-stage">Inicializando</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-label">Progresso</div>
            <div class="hero-stat-value brand" id="hero-progress">0%</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-label">Conectividade</div>
            <div class="hero-stat-value" id="polling-status">Bridge nativa</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="card soft">
          <div class="card-body">
            <div class="progress-head">
              <div class="progress-copy">
                <div class="progress-label">Fase operacional</div>
                <div class="stage" id="stage"></div>
              </div>
              <div class="percent" id="percent">0%</div>
            </div>
            <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
            <div class="meta" id="meta"></div>
            <div class="error" id="error"></div>
            <div class="status-row">
              <span><strong id="step-count"></strong></span>
              <span id="last-update"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="card">
          <div class="card-body focus-card">
            <div class="focus-copy">
              <div class="focus-label">Etapa em execucao</div>
              <div class="focus-title" id="focus-title"></div>
              <div class="focus-detail" id="focus-detail"></div>
            </div>
            <div class="focus-badge" id="focus-badge">Em curso</div>
          </div>
        </div>
      </div>

      <div class="steps-section">
        <div class="steps-head">
          <div class="section-title">Pipeline de provisionamento</div>
        </div>
        <div class="steps" id="steps"></div>
        <div class="completed-wrap" id="completed-wrap" style="display:none;">
          <div class="completed-block">
            <details>
              <summary class="completed-toggle" id="completed-toggle"></summary>
              <div class="completed-list" id="completed-steps"></div>
            </details>
          </div>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="refresh-btn">Atualizar agora</button>
      </div>
    </div>
  </div>
  <script>
    let currentStatus = __INITIAL_STATUS_JSON__;
    const logoLightUrl = __LOGO_LIGHT_URL__;
    const logoDarkUrl = __LOGO_DARK_URL__;

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[char]));
    }

    function statusLabel(value) {
      if (value === 'complete') return 'Concluido';
      if (value === 'error') return 'Erro';
      return 'Pendente';
    }

    function statusBadgeLabel(value) {
      if (value === 'complete') return 'Concluido';
      if (value === 'error') return 'Atencao';
      return 'Em curso';
    }

    function render(status) {
      currentStatus = status;
      const preferredLogo = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        ? (logoLightUrl || logoDarkUrl)
        : (logoDarkUrl || logoLightUrl);
      const brandLogo = document.getElementById('brand-logo');
      if (preferredLogo) {
        brandLogo.src = preferredLogo;
        brandLogo.style.display = '';
      } else {
        brandLogo.style.display = 'none';
      }

      const progressPct = status.progress_pct || 0;
      document.getElementById('title').textContent = status.title || 'Instalacao do Agente Trilink';
      document.getElementById('summary').textContent = status.summary || '';
      document.getElementById('stage').textContent = status.stage || 'Inicializando';
      document.getElementById('hero-stage').textContent = status.stage || 'Inicializando';
      document.getElementById('percent').textContent = progressPct + '%';
      document.getElementById('hero-progress').textContent = progressPct + '%';
      document.getElementById('bar-fill').style.width = progressPct + '%';
      document.getElementById('last-update').textContent = 'Atualizado em ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const meta = document.getElementById('meta');
      meta.innerHTML = '';
      const pills = [];
      if (status.company_name) pills.push('Empresa: ' + status.company_name);
      if (status.host_id) pills.push('Host: ' + status.host_id);
      if (status.rustdesk_id) pills.push('RustDesk ID: ' + status.rustdesk_id);
      if (status.complete) pills.push('Status: pronto');
      pills.forEach((text) => {
        const pill = document.createElement('span');
        pill.className = 'pill';
        pill.textContent = text;
        meta.appendChild(pill);
      });

      const error = document.getElementById('error');
      if (status.last_error) {
        error.classList.add('visible');
        error.textContent = status.last_error;
      } else {
        error.classList.remove('visible');
        error.textContent = '';
      }

      const allSteps = status.steps || [];
      const pendingSteps = allSteps.filter((step) => step.status !== 'complete');
      const completedSteps = allSteps.filter((step) => step.status === 'complete');
      const currentStep = pendingSteps[0] || completedSteps[completedSteps.length - 1] || null;
      document.getElementById('focus-title').textContent = currentStep ? currentStep.label : 'Inicializando';
      document.getElementById('focus-detail').textContent = currentStep ? (currentStep.detail || '') : '';
      document.getElementById('focus-badge').textContent = currentStep ? statusBadgeLabel(currentStep.status) : 'Em curso';
      document.getElementById('step-count').textContent = completedSteps.length + ' de ' + allSteps.length + ' etapas concluidas';

      const steps = document.getElementById('steps');
      steps.innerHTML = '';
      pendingSteps.forEach((step, index) => {
        const article = document.createElement('article');
        article.className = 'step ' + (step.status || 'pending');
        article.innerHTML =
          '<div class="step-index">' + String(index + 1).padStart(2, '0') + '</div>' +
          '<div class="step-copy">' +
            '<div class="step-label">' + escapeHtml(step.label) + '</div>' +
            '<div class="step-detail">' + escapeHtml(step.detail || '') + '</div>' +
          '</div>' +
          '<div class="step-status">' + escapeHtml(statusLabel(step.status)) + '</div>';
        steps.appendChild(article);
      });

      const completedWrap = document.getElementById('completed-wrap');
      const completedTitle = document.getElementById('completed-toggle');
      const completedList = document.getElementById('completed-steps');
      completedList.innerHTML = '';
      if (completedSteps.length > 0) {
        completedWrap.style.display = '';
        completedTitle.textContent = 'Etapas concluídas (' + completedSteps.length + ')';
        completedSteps.forEach((step, index) => {
          const article = document.createElement('article');
          article.className = 'step complete';
          article.innerHTML =
            '<div class="step-index">' + String(index + 1).padStart(2, '0') + '</div>' +
            '<div class="step-copy">' +
              '<div class="step-label">' + escapeHtml(step.label) + '</div>' +
              '<div class="step-detail">' + escapeHtml(step.detail || '') + '</div>' +
            '</div>' +
            '<div class="step-status">Concluido</div>';
          completedList.appendChild(article);
        });
      } else {
        completedWrap.style.display = 'none';
      }
    }

    let nativeRefreshTimer = null;
    let refreshInFlight = false;

    function hasNativeBridge() {
      return !!(window.agentBridge && window.agentBridge.available && typeof window.agentBridge.invoke === 'function');
    }

    async function refreshViaNativeBridge() {
      if (!hasNativeBridge()) return false;
      try {
        const raw = await window.agentBridge.invoke('get_setup_status', '');
        const status = typeof raw === 'string' ? JSON.parse(raw) : raw;
        render(status);
        return true;
      } catch (_) {
        return false;
      }
    }

    async function refresh() {
      if (refreshInFlight) return;
      if (document.hidden) return;

      refreshInFlight = true;
      try {
        await refreshViaNativeBridge();
      } finally {
        refreshInFlight = false;
      }
    }

    function connectSetupEvents() {
      if (!hasNativeBridge()) {
        document.getElementById('polling-status').textContent = 'Bridge indisponivel';
        return;
      }

      document.getElementById('polling-status').textContent = 'Bridge nativa ativa';
      if (nativeRefreshTimer) {
        window.clearInterval(nativeRefreshTimer);
      }
      nativeRefreshTimer = window.setInterval(refresh, 5000);
      refresh();
    }

    document.getElementById('refresh-btn').addEventListener('click', refresh);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        refresh();
      }
    });
    window.addEventListener('beforeunload', () => {
      if (nativeRefreshTimer) {
        window.clearInterval(nativeRefreshTimer);
        nativeRefreshTimer = null;
      }
    });
    render(currentStatus);
    connectSetupEvents();
  </script>
</body>
</html>
